{{- $related := .Page.Site.RegularPages.Related .Page | first 4 -}}
{{- if gt (len $related) 0 -}}
<section class="my-10 rounded-xl border border-neutral-700/60 bg-neutral-900/20 p-5">
  <h2 class="mt-0">Contenus lies</h2>
  <ul>
    {{- range $related -}}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{- end -}}
  </ul>
</section>
{{- end -}}
