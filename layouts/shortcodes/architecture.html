<figure class="my-8 rounded-xl border border-neutral-700/60 bg-neutral-900/20 p-4">
  {{ with .Get "title" }}<figcaption class="mb-3 font-semibold">{{ . }}</figcaption>{{ end }}
  {{ with .Get "src" }}<img src="{{ . }}" alt="{{ $.Get "alt" | default "schema d'architecture" }}" loading="lazy">{{ end }}
  {{ with .Get "caption" }}<p class="mb-0 mt-3 text-sm opacity-80">{{ . }}</p>{{ end }}
</figure>
